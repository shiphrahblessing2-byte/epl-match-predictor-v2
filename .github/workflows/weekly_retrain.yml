name: Weekly Retrain

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # ── All secrets available to EVERY step ──────────────
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
      HF_TOKEN:         ${{ secrets.HF_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch new matchweek data
        run: python src/api_client.py

      - name: Run feature engineering
        run: python src/feature_engineer.py

      - name: Retrain model
        run: python src/train_model.py

      - name: Gate check — must pass to deploy
        run: python src/monitor.py --gate

      - name: Deploy to HuggingFace Spaces
        if: success()
        run: python src/deploy.py

        name: Log predictions + update accuracy
        if: success()
        run: python src/log_predictions.py --all

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Weekly retrain FAILED at $(date)"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"